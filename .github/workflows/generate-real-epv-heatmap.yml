name: generate-real-epv-heatmap

on:
  push:
    branches: [main]
    paths:
      - "scripts/generate_real_epv_heatmap.py"
      - ".github/workflows/generate-real-epv-heatmap.yml"

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: python -m pip install numpy pandas matplotlib

      - name: Generate heatmap from pinned public dataset
        run: python scripts/generate_real_epv_heatmap.py

      - name: Commit generated artifacts
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add artifacts/epv_heatmap_real.png \
                  artifacts/epv_heatmap_real.csv \
                  artifacts/epv_state_values_real.csv \
                  artifacts/epv_heatmap_metadata.json
          if ! git diff --cached --quiet; then
            git commit -m "Generate EPV heatmap from verified Premiership data"
            git push
          fi
